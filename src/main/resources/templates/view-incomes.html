<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Incomes - LedgerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="fas fa-book"></i> LedgerFlow
            </a>
            <div class="ms-auto">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-light">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4">My Income</h2>
                <a th:href="@{/income/add}" class="btn btn-success mb-3">
                    <i class="fas fa-plus"></i> Add New Income
                </a>
                <a th:href="@{/dashboard}" class="btn btn-secondary mb-3 ms-2">
                    <i class="fas fa-chart-line"></i> Back to Dashboard
                </a>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Source</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="income : ${incomes}">
                                <td th:text="${income.incomeDate}">2024-01-01</td>
                                <td th:text="${income.description}">Salary Payment</td>
                                <td th:text="${income.category}">Salary</td>
                                <td th:text="${income.incomeSource}">Company Name</td>
                                <td th:text="'$' + ${income.amount}">$5000</td>
                                <td>
                                    <a th:href="@{/income/delete/{id}(id=${income.id})}" 
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirmDelete(this.href)">
                                        <i class="fas fa-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${incomes.isEmpty()}">
                                <td colspan="6" class="text-center">
                                    <p class="text-muted">No income records found. <a th:href="@{/income/add}">Add your first income!</a></p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function confirmDelete(url) {
            if (confirm('Are you sure you want to delete this income record? This action cannot be undone.')) {
                window.location.href = url;
            }
            return false;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
